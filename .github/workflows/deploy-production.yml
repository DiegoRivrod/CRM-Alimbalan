##
## Deploy a Producción — corre solo cuando se hace merge/push a main.
##
## Frontend: Vercel se despliega automáticamente via GitHub Integration.
## Backend:  Este workflow corre migraciones SQL y despliega Edge Functions.
##
## Secrets necesarios:
##   SUPABASE_ACCESS_TOKEN  — token personal (supabase.com/dashboard/account/tokens)
##   SUPABASE_PROJECT_REF   — ID del proyecto (hbxfohohfuzzihjhzhcy)
##   (SUPABASE_DB_PASSWORD solo si db push lo requiere — ver nota abajo)
##

name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # No cancelar deploys en progreso

jobs:
  deploy-supabase:
    name: Deploy Supabase (Migraciones + Functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Sin nombre, la CLI despliega TODAS las funciones bajo supabase/functions/
      # Fuente: https://supabase.com/docs/guides/functions/deploy
      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
